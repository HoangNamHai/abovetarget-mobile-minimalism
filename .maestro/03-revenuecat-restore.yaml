# RevenueCat — Restore Purchases invokes the SDK and re-applies entitlements.
appId: com.h2ai.pmpexampro
tags:
  - revenuecat
---
- launchApp
# Wait for the app to finish cold-starting before deep-linking (avoids a race
# where the link is delivered before the router is ready, seen on Android).
- extendedWaitUntil:
    visible: ".*CURRENT STREAK.*|.*ACCOUNT.*"
    timeout: 30000
- openLink: "pmp-exam-pro://profile"
- extendedWaitUntil:
    visible: ".*Restore Purchases.*"
    timeout: 15000
- tapOn: ".*Restore Purchases.*"
# A native alert reports the result ("Restore complete" / "Restore failed").
- extendedWaitUntil:
    visible: "Restore complete|Restore failed|restored"
    timeout: 20000
- takeScreenshot: artifacts/03-restore-result
- tapOn: "OK"
