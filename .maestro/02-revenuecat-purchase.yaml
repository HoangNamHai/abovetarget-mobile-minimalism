# RevenueCat — buy a package via the Test Store and confirm the `pro` entitlement unlocks.
# Requires a FREE starting state (a fresh install / un-purchased RevenueCat user).
appId: com.h2ai.pmpexampro
tags:
  - revenuecat
---
- launchApp
# Wait for the app to finish cold-starting before deep-linking (avoids a race
# where the link is delivered before the router is ready, seen on Android).
- extendedWaitUntil:
    visible: ".*CURRENT STREAK.*|.*ACCOUNT.*"
    timeout: 30000
- openLink: "pmp-exam-pro://paywall"
- extendedWaitUntil:
    visible: ".*Monthly.*[$].*"
    timeout: 20000
- tapOn: ".*Monthly.*[$].*"
- tapOn: "CONTINUE"
# RevenueCat Test Store shows a simulated purchase sheet.
- extendedWaitUntil:
    visible: "(?i).*test valid purchase.*"
    timeout: 15000
- takeScreenshot: artifacts/02a-teststore-dialog
- tapOn: "(?i).*test valid purchase.*"
- waitForAnimationToEnd:
    timeout: 10000
- openLink: "pmp-exam-pro://profile"
- extendedWaitUntil:
    visible: "PREMIUM"
    timeout: 15000
- assertVisible: "PREMIUM"
- assertNotVisible: "Upgrade to Premium"
- takeScreenshot: artifacts/02b-premium
