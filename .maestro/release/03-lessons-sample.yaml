# Release free build — open a sample of 2 lessons per module (16 of 51) by deep link
# and confirm each lesson detail renders real content (no white screen / crash).
# The other 35 lessons are covered by the JSON source audit. Free build => all unlocked.
appId: com.h2ai.pmpexampro
tags:
  - release
  - lessons
---
- launchApp
- extendedWaitUntil:
    visible: ".*Home.*|.*Lessons.*"
    timeout: 60000

# Per lesson: deep-link in, wait for body text to render, screenshot.
# --- Module A1 (Foundation) ---
- openLink: "pmp-exam-pro://lesson/A1L1"
- extendedWaitUntil: { visible: ".*[A-Za-z]{4,}.*", timeout: 20000 }
- takeScreenshot: artifacts/rel-lsn-A1L1
- openLink: "pmp-exam-pro://lesson/A1L5"
- extendedWaitUntil: { visible: ".*[A-Za-z]{4,}.*", timeout: 20000 }
- takeScreenshot: artifacts/rel-lsn-A1L5

