        - article [ref=e85]:
          - heading "What it does" [level=2] [ref=e86]
          - paragraph [ref=e87]: RISE is a sleep and energy tracking application designed to help users improve their daily performance by managing their 'sleep debt' and understanding their natural energy cycles. The app calculates a personalized daily energy schedule based on sleep patterns and circadian rhythm, predicting a user's energy peaks and dips throughout the day. It provides tools and reminders to help users align their activities with their biological clock, aiming for better productivity and overall well-being.
          - heading "Where it shines" [level=2] [ref=e88]
          - paragraph [ref=e89]: RISE stands out by shifting the conversation from merely tracking hours slept to actively managing daily energy. The core of this is the Energy Schedule, first introduced at 02:41, which provides a simple, powerful visualization of when a user will feel their best and when they'll experience a dip. The onboarding is also exceptional, using a clever "drug" metaphor at 00:01 to frame sleep as a powerful tool for self-improvement. Finally, its commitment to transparency, shown in the "Synthesizing insights" screen at 01:57, builds significant user trust in its scientific approach.
          - heading "UX highlights" [level=2] [ref=e90]
          - list [ref=e91]:
            - listitem [ref=e92]:
              - strong [ref=e93]: "Strong Narrative Hook:"
              - text: The onboarding (00:01) reframes sleep as a desirable product, immediately capturing user interest and establishing value.
            - listitem [ref=e94]:
              - strong [ref=e95]: "Transparent Data Processing:"
              - text: Instead of a generic loading screen, the app shows how it's building a personalized plan at 01:57, which boosts credibility.
            - listitem [ref=e96]:
              - strong [ref=e97]: "Interactive Calibration:"
              - text: Users can manually adjust their calculated 'sleep need' at 02:11, fostering a sense of control and partnership with the app.
            - listitem [ref=e98]:
              - strong [ref=e99]: "Actionable Energy Graph:"
              - text: The main dashboard visualizes daily energy peaks and dips, providing predictive and actionable insights rather than just historical data.
            - listitem [ref=e100]:
              - strong [ref=e101]: "Contextual Reinforcement:"
              - text: During the quiz, small pop-ups appear (e.g., at 00:47) to provide scientific context for the questions, reinforcing the app's authority.
            - listitem [ref=e102]:
              - strong [ref=e103]: "Comprehensive Tools:"
              - text: The 'Tools' section (06:32) is well-organized, offering guides, aids, and reminders that are directly linked to the user's personalized schedule.
          - heading "Monetization & growth" [level=2] [ref=e104]
          - paragraph [ref=e105]: RISE uses a hard paywall with a free trial, presented after a lengthy and engaging onboarding process. At 03:19, the user is shown a single primary offer for a 7-day free trial that converts to a yearly subscription, priced at $69.99/year. The screen is supported by social proof from Apple, Editors' Choice, and the Sleep Foundation. By making users invest significant time in the personalization quiz, RISE increases their commitment, making them more likely to start a trial to see the results of their effort. The app also features a referral program, accessible from the profile screen, where users can gift a free trial to friends (05:42).
          - heading "Who it’s for" [level=2] [ref=e106]
          - paragraph [ref=e107]: This app is targeted at performance-oriented individuals, such as students, professionals, and athletes, who want to optimize their daily energy and productivity. The scientific framing and focus on concepts like 'sleep debt' and 'circadian rhythm' appeal to users who are data-driven and looking for a structured way to improve their well-being. It's less for casual users and more for those committed to making tangible lifestyle changes based on biological data.
          - heading "Notes & opportunities" [level=2] [ref=e108]
          - paragraph [ref=e109]: The onboarding flow is very long. While it's effective at building value, its length could be a point of friction for less patient users. The dashboard, while informative, has a lot of information presented at once and could benefit from progressive disclosure for new users. For example, the 'Your essential tools' overlay at 05:07 feels a bit like a patch to simplify an otherwise dense initial view. Manually adding sleep data, as shown at 11:11, is a multi-step process that could be streamlined.
